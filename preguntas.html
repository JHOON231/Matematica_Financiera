<!DOCTYPE html>
<html lang="es">

<head>
    <!-- CONFIGURACIÓN BÁSICA -->
    <meta charset="UTF-8">
    <!-- RESPONSIVE PARA CELULARES -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- TÍTULO DE LA PÁGINA -->
    <title>Preguntas Matemática Financiera</title>
    <!-- CONEXIÓN CON CSS -->
    <link rel="stylesheet" href="preguntas.css">
</head>

<body>
    <!-- TÍTULO PRINCIPAL -->
    <h1>Preguntas de Matemática Financiera</h1>

    <!-- CONTENEDOR GENERAL -->
    <div class="contenedor">

            <!-- PREGUNTA 1 -->
        <div class="pregunta">
            <h2>1. ¿Qué estudia la matemática financiera?</h2>
            <button onclick="correcta(this)">B) El valor del dinero en el tiempo</button>
            <button onclick="incorrecta(this)">A) El cuerpo humano</button>
            <button onclick="incorrecta(this)">C) Los animales</button>
            <button onclick="incorrecta(this)">D) Las computadoras</button>
        </div>

            <!-- PREGUNTA 2 -->
        <div class="pregunta">
            <h2>2. ¿Qué es el interés simple?</h2>

            <button onclick="incorrecta(this,)">
                A) Interés sobre el interés
            </button>

            <button onclick="correcta(this)">B) Interés solo sobre el capital inicial</button>
            <button onclick="incorrecta(this)">C) Un préstamo gratis</button>
            <button onclick="incorrecta(this)">D) Una cuenta bancaria</button>
        </div>

            <!-- PREGUNTA 3 -->
        <div class="pregunta">
            <h2> 3. ¿Qué representa la letra C en fórmulas financieras?</h2>
            <button onclick="correcta(this)"> A) Capital</button>
            <button onclick="incorrecta(this)">B) Cliente</button>
            <button onclick="incorrecta(this)">C) Compra</button>
            <button onclick="incorrecta(this)">D) Caja</button>
        </div>

        <!-- PREGUNTA 4 -->
        <div class="pregunta">
            <h2> 4. ¿Qué hacen los bancos con los intereses?</h2>
            <button onclick="incorrecta(this)">A) Regalan dinero</button>
            <button onclick="correcta(this)">B) Cobran o pagan por préstamos e inversiones</button>
            <button onclick="incorrecta(this)">C) Eliminan cuentas</button>
            <button onclick="incorrecta(this)">D) Cierran empresas</button>
        </div>

        <!-- PREGUNTA 5 -->
        <div class="pregunta">
            <h2> 5. ¿Cuál fórmula pertenece al interés simple?</h2>
            <button onclick="correcta(this)">A) I = C × i × t</button>
            <button onclick="incorrecta(this)">B) E = mc²</button>
            <button onclick="incorrecta(this)">C) a² + b²</button>
            <button onclick="incorrecta(this)">D) F = m × a</button>
        </div>

    </div>
    <script src="preguntas.js"></script>
</body>
</html>
